# /etc/nginx/sites-available/atomspot.conf
# Reverse proxy → Nitro Node server on 127.0.0.1:3000
# Replace `example.com` with your real domain before enabling.

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # ACME / Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com www.example.com;

    # ---- TLS (managed by certbot) ----
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- Limits ----
    client_max_body_size 25m;      # product photos / return photos / support attachments
    keepalive_timeout 65;
    server_tokens off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml font/ttf font/otf;

    # Optional: brotli (uncomment if nginx was built with ngx_brotli)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript image/svg+xml;

    # ---- Static asset cache (Nitro emits hashed filenames under /_build/ and /assets/) ----
    location ~* ^/(assets|_build|_nuxt|_server)/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ---- Health check (loopback only is fine here, but expose for ELB/uptime) ----
    location = /api/public/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # ---- App + WebSocket + SSR ----
    location / {
        proxy_pass http://127.0.0.1:3000;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (Supabase Realtime is browser→Supabase, but keep
        # this here for in-app SSE / future realtime endpoints proxied via app)
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Streaming / SSR friendliness
        proxy_buffering off;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }
}

# Map needed by the Upgrade header pattern above. Put this in
# /etc/nginx/conf.d/upgrade-map.conf (or in nginx.conf `http {}`):
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
